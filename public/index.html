<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ReyzCloud</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0b0f1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 40px; border-radius: 24px; width: 320px; text-align: center; border: 1px solid #334155; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: none; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #38bdf8; font-weight: bold; cursor: pointer; color: #0f172a; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#38bdf8">ReyzCloud</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="doLogin()">MASUK</button>
    </div>
    <script>
        async function doLogin() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            try {
                const res = await axios.post('/api/login', { username, password });
                if(res.data.success) {
                    localStorage.setItem('reyz_auth', 'true');
                    window.location.href = '/dashboard.html';
                }
            } catch (e) { alert("Username/Password Salah!"); }
        }
    </script>
</body>
</html>
